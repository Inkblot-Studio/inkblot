apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: inkblot-web-prod
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: web-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: web-app
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 8
