apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lead-worker
  template:
    metadata:
      labels:
        app: lead-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/inkblot/web:latest
          imagePullPolicy: Always
          command: ["npm", "run", "worker"]
          envFrom:
            - secretRef:
                name: web-secrets
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
